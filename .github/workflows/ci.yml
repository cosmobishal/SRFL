name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite
        run: |
          pytest tests/ -v --tb=short

      - name: Run standalone runner (smoke test)
        run: |
          python run_tests.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyflakes
      - name: Check for syntax errors
        run: |
          python -m pyflakes src/srfl/
          python -m pyflakes experiments/
          python -m pyflakes tests/

  figures:
    name: Generate Figures (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Run figure generation (low-res smoke test)
        run: |
          python scripts/generate_figures.py --n 128 --steps 20 --outdir /tmp/srfl_ci_figs --dpi 72
      - name: Verify figures were created
        run: |
          ls /tmp/srfl_ci_figs/*.png | wc -l
